<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Form with Validation</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>       
  <h1 class="cf">Contact From</h1>
  <div class="f">
    <form>
      <label for="name">Name:</label><br>
      <input type="text" id="name" name="name" required minlength="3"><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="phone">Phone:</label><br>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>
      <small>(10 digit number)</small><br><br>

      <label for="password">Password:</label><br>
      <input type="password" id="password" name="password" required minlength="6"><br><br>

      <label for="age">Age:</label><br>
      <input type="number" id="age" name="age" min="18" max="100" required><br><br>

      <button type="submit">Submit</button>
    </form>
  </div>

</body>

</html>
