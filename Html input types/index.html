<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html input types</title>
</head>

<body>
    <h1>Daily Practice Problem</h1>
    <table>
        <tr>
            <th>Name</th>
            <th>Input Type</th>
        </tr>
        <tr>
            <td>Text</td>
            <td><input type="text" required></td>
        </tr>
        <tr>
            <td>Number</td>
            <td><input type="number"></td>
        </tr>
        <tr>
            <td>Radio button</td>
            <td>
                <input type="radio"> male
                <input type="radio"> female
            </td>
        </tr>
        <tr>
            <td>Password</td>
            <td><input type="password"></td>
        </tr>
        <tr>
            <td>Email</td>
            <td><input type="email"></td>
        </tr>
        <tr>
            <td>Checkbox</td>
            <td><input type="checkbox"> male
                <input type="checkbox"> female
            </td>
        </tr>
        <tr>
            <td>Date</td>
            <td><input type="date"></td>
        </tr>
        <tr>
            <td>Time</td>
            <td><input type="time"></td>
        </tr>
        <tr>
            <td>Color Picker</td>
            <td><input type="color"></td>
        </tr>
        <tr>
            <td>Range Slider</td>
            <td><input type="range" min="0" max="100"></td>
        </tr>
        <tr>
            <td>File Upload</td>
            <td><input type="file"></td>
        </tr>
        <tr>
            <td>URL</td>
            <td><input type="url"></td>
        </tr>
        <tr>
            <td>Search</td>
            <td><input type="search"></td>
        </tr>
        <tr>
            <td>Textarea</td>
            <td><textarea name="textarea" id=""></textarea></td>
        </tr>
        <tr>
            <td>Submit button</td>
            <td><input type="submit"></td>
        </tr>
    </table>
</body>

</html>
